<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=240, height=320">
<title>Desky · Weather</title>
<link rel="stylesheet" href="styles.css">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body {
    width: 100%; height: 100%; background: #000;
    display: flex; align-items: center; justify-content: center;
    overflow: hidden; font-family: var(--font-display);
    -webkit-font-smoothing: antialiased;
  }
  .screen {
    width: 240px; height: 320px; background: var(--bg); color: var(--fg);
    overflow: hidden; position: relative;
    display: flex; flex-direction: column; padding: 22px;
  }
  .city {
    font-size: var(--size-label); font-weight: var(--w-medium);
    letter-spacing: var(--track-label); color: var(--fg-muted);
  }
  .main { flex: 1; display: flex; align-items: center; justify-content: space-between; }
  .left { display: flex; flex-direction: column; gap: 8px; }
  .temp {
    font-size: 66px; font-weight: var(--w-bold); line-height: 0.85;
    letter-spacing: -0.03em; font-variant-numeric: tabular-nums;
    display: flex; align-items: flex-start;
  }
  .temp .unit { font-size: 26px; font-weight: var(--w-medium);
                margin-top: 6px; margin-left: 2px; color: var(--fg-muted); }
  .cond { font-size: var(--size-body); font-weight: var(--w-medium);
          letter-spacing: 0.04em; color: var(--fg); }
  .icon { width: 74px; height: 74px; flex: none; }

  .stats { display: flex; border-top: 1px solid var(--line); padding-top: 14px; }
  .stat { flex: 1; display: flex; flex-direction: column; gap: 5px; }
  .stat .k { font-size: 9px; letter-spacing: 0.16em; color: var(--fg-muted);
             font-weight: var(--w-medium); }
  .stat .v { font-size: 18px; font-weight: var(--w-bold);
             font-variant-numeric: tabular-nums; }
</style>
</head>
<body>
  <div class="screen">
    <div class="city">BANGALORE</div>
    <div class="main">
      <div class="left">
        <div class="temp"><span id="t">--</span><span class="unit">°C</span></div>
        <div class="cond" id="cond">—</div>
      </div>
      <div class="icon" id="icon"></div>
    </div>
    <div class="stats">
      <div class="stat"><span class="k">HUMIDITY</span><span class="v" id="hum">--%</span></div>
      <div class="stat"><span class="k">FEELS LIKE</span><span class="v" id="feels">--°</span></div>
    </div>
  </div>

<script>
  const WARM = '#E8C97A', COOL = '#7AC8E8', FG = '#F2F2F2', MUT = '#6B6B6B';

  function rays(c, cx=37, cy=37, r=15) {
    const pts = [[0,-1],[0.7,-0.7],[1,0],[0.7,0.7],[0,1],[-0.7,0.7],[-1,0],[-0.7,-0.7]];
    return pts.map(p => {
      const x1 = cx+p[0]*(r+5), y1 = cy+p[1]*(r+5);
      const x2 = cx+p[0]*(r+11), y2 = cy+p[1]*(r+11);
      return `<line x1="${x1}" y1="${y1}" x2="${x2}" y2="${y2}" stroke="${c}" stroke-width="3" stroke-linecap="round"/>`;
    }).join('');
  }
  function cloud(fill, y=20) {
    return `<ellipse cx="28" cy="${y+18}" rx="13" ry="13" fill="${fill}"/>
      <ellipse cx="44" cy="${y+16}" rx="15" ry="15" fill="${fill}"/>
      <ellipse cx="18" cy="${y+24}" rx="10" ry="10" fill="${fill}"/>
      <rect x="16" y="${y+22}" width="42" height="14" fill="${fill}"/>`;
  }
  const ICONS = {
    sun:   c => `<circle cx="37" cy="37" r="15" fill="none" stroke="${c}" stroke-width="3"/>${rays(c)}`,
    cloud: c => cloud(FG, 20),
    rain:  c => `${cloud(FG,16)}<line x1="26" y1="58" x2="22" y2="68" stroke="${COOL}" stroke-width="3" stroke-linecap="round"/>
      <line x1="38" y1="58" x2="34" y2="68" stroke="${COOL}" stroke-width="3" stroke-linecap="round"/>
      <line x1="50" y1="58" x2="46" y2="68" stroke="${COOL}" stroke-width="3" stroke-linecap="round"/>`,
    storm: c => `${cloud(FG,16)}<line x1="38" y1="54" x2="30" y2="66" stroke="${WARM}" stroke-width="3" stroke-linecap="round"/>
      <line x1="30" y1="66" x2="40" y2="64" stroke="${WARM}" stroke-width="3" stroke-linecap="round"/>
      <line x1="40" y1="64" x2="34" y2="74" stroke="${WARM}" stroke-width="3" stroke-linecap="round"/>`,
    snow:  c => `${cloud(FG,16)}<circle cx="26" cy="62" r="2.5" fill="${FG}"/>
      <circle cx="38" cy="66" r="2.5" fill="${FG}"/><circle cx="50" cy="62" r="2.5" fill="${FG}"/>`,
    fog:   c => `${cloud(FG,12)}<line x1="20" y1="58" x2="54" y2="58" stroke="${MUT}" stroke-width="3" stroke-linecap="round"/>
      <line x1="24" y1="66" x2="50" y2="66" stroke="${MUT}" stroke-width="3" stroke-linecap="round"/>`,
  };

  function render(d) {
    const n = parseInt(d.temp) || 0;
    const ac = n >= 26 ? WARM : n <= 14 ? COOL : FG;
    document.getElementById('t').textContent = n;
    document.getElementById('t').parentElement.style.color = ac;
    document.getElementById('cond').textContent  = d.condition;
    document.getElementById('hum').textContent   = d.humidity;
    document.getElementById('feels').textContent = d.feels_like;
    const fn = ICONS[d.icon] || ICONS.cloud;
    document.getElementById('icon').innerHTML =
      `<svg viewBox="0 0 74 74" width="74" height="74">${fn(ac)}</svg>`;
  }

  async function update() {
    try {
      const r = await fetch('/widget/weather');
      if (r.ok) render(await r.json());
    } catch(e) {}
  }
  update(); setInterval(update, 300000);
</script>
</body>
</html>
